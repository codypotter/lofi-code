name: Editorial PR Review

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "cms/_posts/**"

jobs:
  editorial-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::812100404712:role/role-lofi-code-githubci
          aws-region: us-east-1

      - name: Determine changed post files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          files=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- 'cms/_posts/*.md')
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run editorial review
        if: steps.changed.outputs.files != ''
        env:
          ENVIRONMENT: production
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: go run ./cmd/prreview $CHANGED_FILES > comment.md

      - name: Post or update PR comment
        if: steps.changed.outputs.files != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file comment.md --edit-last \
            || gh pr comment "$PR_NUMBER" --body-file comment.md
